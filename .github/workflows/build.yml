name: Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows
          - os: ubuntu-22.04
            platform: Linux
          - os: macos-latest
            platform: macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libasound2-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run Rust library tests
        run: |
          cargo test --lib --locked
          cargo test --lib --locked --features fdk-aac-decoder

      - name: Check Rust crates
        run: |
          cargo check --locked
          cargo check --locked --bin light-ear-relay
          cargo check --locked --manifest-path src-tauri/Cargo.toml
          cargo check --locked --features fdk-aac-decoder
          cargo check --locked --bin light-ear-relay --features fdk-aac-decoder
          cargo check --locked --manifest-path src-tauri/Cargo.toml --features fdk-aac-decoder

      - name: Build relay binary
        run: cargo build --locked --release --bin light-ear-relay --features fdk-aac-decoder

      - name: Build Tauri desktop bundle
        run: npx --yes @tauri-apps/cli@^2 build --features fdk-aac-decoder --config src-tauri/tauri.ci.conf.json
